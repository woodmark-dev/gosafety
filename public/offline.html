<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>GoSafety | Offline</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at 20% 20%, #22c55e 0%, #14532d 35%, #0f172a 100%);
        color: #f8fafc;
      }

      main {
        width: min(90vw, 420px);
        padding: 2rem;
        border-radius: 1rem;
        background: rgba(15, 23, 42, 0.76);
        box-shadow: 0 16px 50px rgba(2, 6, 23, 0.45);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.65rem;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #dbeafe;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>
        GoSafety cannot reach the network right now. Check your connection and reopen the app.
      </p>
    </main>
  </body>
</html>
